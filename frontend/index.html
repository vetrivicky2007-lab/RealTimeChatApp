<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Time Chat</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="header">

          <h1>Real Time Chat</h1>

         <button id="logoutBtn">
           Logout
         </button>

        </div>

        <div class="main">

        <div class="users">

          <h2>Online Users</h2>

          <div id="user-list"></div>

        </div>

            <div class="chat-area">

                <div class="messages">



                </div>

                <div class="input-area">
                    <input
                        type="text"
                        placeholder="Type a message..."
                    >

                    <button id ="sendBtn">
                        Send
                    </button>
                </div>

            </div>

        </div>

    </div>

    <script src="app.js"></script>

</body>
</html>
